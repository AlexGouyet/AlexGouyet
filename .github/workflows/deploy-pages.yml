name: Deploy The Austin Amp to GitHub Pages

on:
  # Only main deploys — the github-pages environment restricts deployments to
  # the default branch, and triggering on other branches just collides in the
  # shared "pages" concurrency group.
  push:
    branches: [main]
  schedule:
    # Hourly content refresh (only fires once this branch is the default branch).
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build static site
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
